<!DOCTYPE html>
<!-- @dsCard group="Pages · Core" name="Platform Map" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Platform Map · DFSA</title>
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:#0c0a07; overflow:hidden;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; -webkit-font-smoothing:antialiased; }

  /* ===== top banner (shared DFSA nav) ===== */
  .drip-topbar{ position:fixed; top:0; left:0; right:0; z-index:50; display:flex; align-items:center; justify-content:space-between;
    gap:16px; flex-wrap:wrap; background:#6E3B2C; border-bottom:1px solid rgba(245,242,232,.16); padding:11px 24px; }
  .drip-topbar .db-brand{ display:flex; align-items:center; gap:11px; text-decoration:none; }
  .drip-topbar .db-dm{ font-weight:800; font-size:23px; letter-spacing:.04em; color:#F5F2E8; line-height:1; }
  .drip-topbar .db-dm span{ color:#F8B133; }
  .drip-topbar .db-sub{ font-size:10.5px; letter-spacing:.07em; text-transform:uppercase; color:rgba(245,242,232,.6); }
  .drip-topbar .db-nav{ display:flex; align-items:center; gap:4px; flex-wrap:wrap; justify-content:flex-end; }
  .drip-topbar .db-nav a{ font-size:13px; font-weight:500; color:rgba(245,242,232,.86); text-decoration:none; padding:7px 11px; border-radius:999px; white-space:nowrap; transition:.14s; }
  .drip-topbar .db-nav a:hover{ background:rgba(245,242,232,.12); color:#fff; }
  .drip-topbar .db-nav a.db-home{ background:rgba(245,242,232,.12); color:#fff; }
  .drip-topbar .db-nav a.active{ background:#F8B133; color:#3a2408; font-weight:600; }
  .drip-topbar .db-nav a.db-cta{ background:transparent; border:1px solid rgba(245,242,232,.35); color:#fff; }
  .drip-topbar .db-nav a.db-cta:hover{ background:rgba(245,242,232,.14); }
  @media(max-width:820px){ .drip-topbar .db-sub{ display:none; } .drip-topbar{ padding:9px 16px; } .drip-topbar .db-nav a{ padding:6px 9px; font-size:12px; } }

  #map{ position:fixed; inset:0; }

  /* ===== loading ===== */
  #ld{ position:fixed; inset:0; z-index:80; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; transition:opacity .6s; }
  #ld.done{ opacity:0; pointer-events:none; }
  #ld .dm{ font-weight:800; text-transform:uppercase; letter-spacing:.08em; font-size:clamp(48px,10vw,104px); color:#f4ecdd; line-height:.9; }
  #ld .dm span{ color:#e0a23c; }
  #ld .bw{ width:min(240px,52vw); height:3px; background:rgba(244,236,221,.14); border-radius:2px; overflow:hidden; }
  #ld .bf{ height:100%; width:0%; background:linear-gradient(90deg,#36b3a6,#e0a23c); transition:width .25s; }
  #ld .pc{ font-size:13px; letter-spacing:.22em; color:#c2ab86; }

  /* ===== title + legend ===== */
  .mtitle{ position:fixed; top:74px; left:26px; z-index:20; max-width:340px; pointer-events:none; }
  .mtitle .kick{ font-size:11px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; color:#e0a23c; }
  .mtitle h1{ font-family:"Oswald",system-ui,sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:.02em;
    font-size:30px; line-height:1.04; margin:8px 0 0; color:#f4ecdd; }
  .mtitle p{ font-size:12.5px; line-height:1.5; color:#a99a82; margin:10px 0 0; }
  .legend{ position:fixed; bottom:20px; left:26px; z-index:20; display:flex; flex-direction:column; gap:7px;
    background:rgba(20,16,11,.7); backdrop-filter:blur(8px); border:1px solid rgba(230,196,132,.2); border-radius:12px; padding:13px 15px; }
  .legend .lr{ display:flex; align-items:center; gap:9px; font-size:11.5px; color:#c2ab86; }
  .legend .sw{ width:11px; height:11px; border-radius:50%; box-shadow:0 0 8px currentColor; }
  .hint{ position:fixed; bottom:20px; right:24px; z-index:20; font-size:11.5px; color:#8d764e;
    background:rgba(20,16,11,.7); border:1px solid rgba(230,196,132,.2); border-radius:999px; padding:8px 15px; }

  /* ===== node detail popup ===== */
  #pop{ position:fixed; z-index:40; display:none; width:300px; background:rgba(24,19,12,.97); color:#f4ecdd;
    border:1px solid rgba(224,162,60,.4); border-radius:14px; padding:18px 19px 17px; box-shadow:0 20px 50px rgba(0,0,0,.55); }
  #pop.show{ display:block; }
  #pop .pmeta{ font-size:10.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; margin-bottom:7px; }
  #pop h3{ font-family:"Oswald",system-ui,sans-serif; font-weight:700; font-size:21px; line-height:1.1; margin:0 0 8px; color:#fff; }
  #pop p{ font-size:13px; line-height:1.55; color:#bcab92; margin:0 0 14px; }
  #pop .pbtn{ display:inline-flex; align-items:center; gap:7px; background:#e0a23c; color:#2a1c08; text-decoration:none;
    font-weight:700; font-size:13px; border-radius:999px; padding:9px 16px; transition:.15s; }
  #pop .pbtn:hover{ background:#f3b955; }
  #pop .px{ position:absolute; top:9px; right:12px; background:none; border:none; color:#8d764e; font-size:20px; cursor:pointer; line-height:1; }
  #pop .px:hover{ color:#fff; }
</style>

<body>

<div class="drip-topbar">
  <a class="db-brand" href="DFSA.html"><span class="db-dm">DFSA<span>.</span></span><span class="db-sub">Dryland Forest Support Accelerator</span></a>
  <div class="db-nav" role="navigation" aria-label="Primary">
    <a class="db-home" href="DFSA.html">⌂ Home</a>

    <a href="DRIP Map.html">Map</a>
    <a href="Library.html">Library</a>
  </div>
</div>

<div id="map"></div>

<div class="mtitle">
  <div class="kick">The platform, mapped</div>
  <h1>DFSA Platform Map</h1>
  <p>Every page of DFSA as one connected network. Click any node to open that page.</p>
</div>

<div class="legend" id="legend"></div>
<div class="hint">Drag to orbit · scroll to zoom · click a node to open</div>

<div id="pop">
  <button class="px" id="popX" aria-label="Close">&times;</button>
  <div class="pmeta" id="popMeta"></div>
  <h3 id="popTitle"></h3>
  <p id="popDesc"></p>

<div id="ld">
  <div class="dm">DFSA<span>.</span></div>
  <div class="bw"><div class="bf" id="ldBar"></div></div>
  <div class="pc" id="ldPct">0%</div>
</div>

<script src="https://unpkg.com/three@0.149.0/build/three.min.js"></script>
<script src="https://unpkg.com/three-spritetext@1.8.1/dist/three-spritetext.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.71.4/dist/3d-force-graph.min.js"></script>
<script>
/* ---------- loading bar ---------- */
(function(){ var p=0,done=false;
  var iv=setInterval(function(){ if(done)return; if(p<90){p+=Math.max(.6,(90-p)*.05); var b=document.getElementById('ldBar'),t=document.getElementById('ldPct'); if(b)b.style.width=p+'%'; if(t)t.textContent=Math.round(p)+'%'; } },60);
  window.__mapLoaded=function(){ if(done)return; done=true; clearInterval(iv); var b=document.getElementById('ldBar'),t=document.getElementById('ldPct'); if(b)b.style.width='100%'; if(t)t.textContent='100%';
    var L=document.getElementById('ld'); setTimeout(function(){ L.classList.add('done'); setTimeout(function(){ L.style.display='none'; },650); },240); };
  setTimeout(window.__mapLoaded, 8000);
})();

/* ---------- groups / palette ---------- */
const GROUPS = {
  hub:       { name:'Platform home',          color:'#F8B133' },
  tool:      { name:'Platform & tools',       color:'#36b3a6' },
  framework: { name:'Frameworks & methods',   color:'#6fb04a' },
  module:    { name:'Knowledge modules',      color:'#5ba9de' },
  story:     { name:'Knowledge & stories',    color:'#e0856b' },
  section:   { name:'Platform sections',      color:'#d8b24a' }
};

/* ---------- nodes = pages ---------- */
const NODES = [
  { id:'drip',  g:'hub',       label:'DFSA — Home',           url:'DFSA.html', val:30,
    desc:'The platform landing page — the activation story, the seven pillars and the library.' },

  { id:'mon',   g:'tool',      label:'MARVEL — M&E system',   url:'MARVEL.html', val:13,
    desc:'Monitoring, Assessment, Reporting, Verification, Evaluation and Learning — the participatory M&E architecture and live results dashboard.' },

  { id:'ilam',  g:'framework', label:'ILAM',                  url:'ILAM Integrated Landscape Assessment Methodology.html', val:16,
    desc:'Integrated Landscape Assessment Methodology — the five-module evidence base from remote sensing to household surveys.' },
  { id:'slpf',  g:'framework', label:'SLPF',                  url:'SLPF Sustainable Landscape Production Framework.html', val:16,
    desc:'Sustainable Landscape Production Framework — the integrated FFS, seed bank and green-value-chain approach.' },
  { id:'rem',   g:'framework', label:'REM',                   url:'REM Regional Exchange Mechanism.html', val:13,
    desc:'Regional Exchange Mechanism — the bridge through which the GCP coordinates and docks with child projects.' },
  { id:'fin',   g:'framework', label:'Financial architecture',url:'DSL-IP Financial Architecture.html', val:11,
    desc:'How the Programme’s funds and fee distribution are structured across the One-FAO delivery model.' },

  { id:'ndvi',  g:'module',    label:'Land productivity (NDVI)', url:'KL_Mod1_LandProductivity_NDVI.html', val:7, desc:'Reading land productivity from satellites — NDVI Trajectory and State indicators.' },
  { id:'fire',  g:'module',    label:'Fire dynamics',         url:'KL_Mod1_Fire.html', val:7, desc:'A 25-year, district-level read on burned area across the Miombo–Mopane ecoregion.' },
  { id:'lada',  g:'module',    label:'Simplified LADA',       url:'KL_Mod3_SimplifiedLADA.html', val:7, desc:'A fast, plot-based field assessment that anchors satellite signals to ground reality.' },
  { id:'stake', g:'module',    label:'Stakeholder & policy',  url:'KL_Mod3_Stakeholder_Policy.html', val:7, desc:'Stakeholder and policy-institutional assessment — the actors and rules that decide what works.' },
  { id:'vchain',g:'module',    label:'Value chains',          url:'KL_Mod3_ValueChains.html', val:7, desc:'Rapid sustainable value-chain assessment — the economic entry points for SLM/SFM.' },
  { id:'hh',    g:'module',    label:'Household & behaviour', url:'KL_Mod4_Household_BehaviourChange.html', val:7, desc:'SHARP+ resilience paired with the COM-B model — what drives adoption decisions.' },
  { id:'carbon',g:'module',    label:'Carbon balance (EX-ACT)', url:'KL_Mod5_Carbon_EXACT_NEXT.html', val:7, desc:'EX-ACT and EX-ACT NEXT — turning land-use change into a measurable global environmental benefit.' },
  { id:'slm',   g:'module',    label:'SLM scaling strategy',  url:'KL_SLM_ScalingStrategy.html', val:8, desc:'A strategy for scaling sustainable land management among smallholders.' },
  { id:'sna',   g:'module',    label:'Knowledge-flow SNA',    url:'SNA_Tutume_Mosetse.html', val:8, desc:'Social network analysis of two Botswana producer organizations — who shares SLM knowledge with whom, the real influencers, and the bottlenecks.' },

  { id:'wwl',   g:'story',     label:'When Women Lead',       url:'When Women Lead.html', val:9, desc:'How women’s leadership and the land’s recovery move together — a story from the gender stream.' },
  { id:'gap',   g:'story',     label:'Gender Action Plan',    url:'Global Gender Action Plan.html', val:10, desc:'The Programme’s gender-responsiveness commitments and actions.' },
  { id:'sist',  g:'story',     label:'Sisteminha · IFES',     url:'Sisteminha-IFES-Malawi-DSL-IP.html', val:10, desc:'Integrated Food and Energy Systems in practice — Malawi’s champion core theme.' },
  { id:'dfsm',  g:'story',     label:'DFSM Campaign',         url:'DFSM Campaign.html', val:9, desc:'Dryland Forest & Sustainable Management — the Programme’s outward-facing campaign.' },

  { id:'about', g:'section',   label:'About',                 url:'DFSA.html#story', val:8, desc:'The case for the accelerator — the three gaps, the window of opportunity, and the Collect · Act · Track approach.' },

  { id:'csb',   g:'module',    label:'Community Seed Banks',  url:'SLPF_CSB_CommunitySeedBanks.html', val:7, desc:'SLPF Pillar 01 — crop diversification, agrobiodiversity and the genetic pool of options communities draw on to adapt.' },
  { id:'fff',   g:'module',    label:'Forest & Farm Facility', url:'SLPF_FFF_ForestFarmFacility.html', val:7, desc:'SLPF Pillar 02 — business incubation along green value chains, so sustainable production pays better than degradation.' },
  { id:'ffs',   g:'module',    label:'Farmer Field Schools',  url:'SLPF_FFS_FarmerFieldSchools.html', val:7, desc:'SLPF Pillar 03 — experiential, farmer-to-farmer learning that transfers SLM/SFM on demonstration plots.' },

  { id:'cofo',  g:'framework', label:'COFO Working Group',    url:'COFO Working Group.html', val:10, desc:'Governance — FAO’s intergovernmental Working Group on Dryland Forests & Agrosilvopastoral Systems; a COFO subsidiary body since 2014.' },
  { id:'wecan', g:'story',     label:'WeCaN',                 url:'WeCaN Community of Practice.html', val:8, desc:'Gender — the Community of Practice for women in dryland forests, linking national and regional networks to global advocacy.' },
  { id:'mevcam',g:'tool',      label:'MEV-CAM',               url:'MEV-CAM Making Every Voice Count.html', val:9, desc:'Monitoring — Making Every Voice Count: participatory video that lets communities document and share restoration knowledge.' }
];

/* ---------- links ---------- */
const L = (s,t)=>({source:s,target:t});
const LINKS = [
  L('drip','ilam'), L('drip','slpf'), L('drip','rem'), L('drip','fin'),
  L('drip','mon'),
  L('drip','about'),
  L('ilam','ndvi'), L('ilam','fire'), L('ilam','lada'), L('ilam','stake'),
  L('ilam','vchain'), L('ilam','hh'), L('ilam','carbon'),
  L('slpf','slm'), L('slm','hh'), L('slpf','sist'), L('slpf','vchain'),
  L('slpf','csb'), L('slpf','fff'), L('slpf','ffs'), L('csb','ffs'), L('fff','vchain'), L('ffs','hh'),
  L('gap','wwl'), L('drip','gap'), L('drip','sist'), L('drip','dfsm'), L('dfsm','rem'),
  L('slpf','sna'), L('sna','ffs'), L('sna','gap'), L('sna','stake'),
  L('mon','ilam'), L('mon','ndvi'), L('mon','fire'), L('mon','lada'), L('mon','stake'), L('mon','vchain'), L('mon','hh'), L('mon','carbon'),
  L('drip','cofo'), L('cofo','rem'), L('drip','wecan'), L('gap','wecan'), L('wecan','wwl'), L('drip','mevcam'), L('mon','mevcam')
];

/* ---------- deterministic layout (pinned: hub centre, primaries on a sphere, children near parents) ---------- */
const PRIMARIES = ['mon','ilam','slpf','rem','fin','gap','dfsm','about'];
const CHILDREN  = { ilam:['ndvi','fire','lada','stake','vchain','hh','carbon'], slpf:['csb','fff','ffs','slm','sist','sna'], gap:['wwl','wecan'], mon:['mevcam'], fin:['cofo'] };
const R1 = 170;
const POS = { drip:[0,0,0] };
(function(){
  const N = PRIMARIES.length;
  PRIMARIES.forEach((id,i)=>{
    const y = 1-(i/(N-1))*2; const r = Math.sqrt(Math.max(0,1-y*y)); const phi = i*2.399963229;
    POS[id] = [ R1*r*Math.cos(phi), R1*y*0.62, R1*r*Math.sin(phi) ];
  });
  Object.entries(CHILDREN).forEach(([p,kids])=>{
    const pp = POS[p], len = Math.hypot(pp[0],pp[1],pp[2])||1;
    const ux=pp[0]/len, uy=pp[1]/len, uz=pp[2]/len;
    kids.forEach((id,j)=>{
      const s = (j-(kids.length-1)/2);
      POS[id] = [ pp[0]+ux*78 + s*26, pp[1]+uy*78 + s*15, pp[2]+uz*78 + (j%2?20:-20) ];
    });
  });
})();

/* ---------- build graph ---------- */
const data = {
  nodes: NODES.map(n=>{ const p = POS[n.id]||[0,0,0]; return Object.assign({}, n, { fx:p[0], fy:p[1], fz:p[2] }); }),
  links: LINKS.map(l=>Object.assign({},l))
};

const Graph = ForceGraph3D()(document.getElementById('map'))
  .backgroundColor('#0c0a07')
  .graphData(data)
  .nodeId('id')
  .nodeVal('val')
  .nodeColor(n => GROUPS[n.g].color)
  .nodeOpacity(0.95)
  .nodeResolution(18)
  .linkColor(()=> 'rgba(226,196,140,0.22)')
  .linkWidth(0.6)
  .linkDirectionalParticles(2)
  .linkDirectionalParticleWidth(1.5)
  .linkDirectionalParticleSpeed(0.006)
  .linkDirectionalParticleColor(()=> 'rgba(224,162,60,0.7)')
  .nodeThreeObjectExtend(true)
  .nodeThreeObject(n => {
    const s = new SpriteText(n.label);
    s.color = '#f4ecdd';
    s.textHeight = n.g==='hub' ? 8 : (n.g==='module' ? 4.6 : 6);
    s.fontFace = 'Poppins, system-ui, sans-serif';
    s.fontWeight = n.g==='hub' ? '700' : '500';
    s.position.y = -(Math.cbrt(n.val)*4 + 7);
    s.material.depthWrite = false;
    return s;
  })
  .onNodeClick(n => openPop(n))
  .onBackgroundClick(()=> hidePop());
window.__G = Graph;
Graph.cooldownTicks(0);   // positions are pinned (fx/fy/fz) — no physics drift

let spin=true, ang=0, radius=470;
function fit(){ try{ Graph.zoomToFit(500, 70); const c=Graph.cameraPosition(); const r=Math.hypot(c.x,c.y,c.z); if(r>120) radius=r; }catch(e){} }
[300,900,1600].forEach(t=>setTimeout(fit,t));
Graph.cameraPosition({ x:0, y:30, z:radius }, {x:0,y:0,z:0}, 0);
(function orbit(){ if(spin){ ang+=0.0014; Graph.cameraPosition({ x:radius*Math.sin(ang), y:30, z:radius*Math.cos(ang) }); } requestAnimationFrame(orbit); })();
['mousedown','touchstart','wheel'].forEach(ev=>document.getElementById('map').addEventListener(ev,()=>{ spin=false; },{passive:true}));

setTimeout(()=> window.__mapLoaded && window.__mapLoaded(), 900);

/* ---------- legend ---------- */
document.getElementById('legend').innerHTML = Object.values(GROUPS).map(g =>
  `<div class="lr"><span class="sw" style="background:${g.color};color:${g.color}"></span>${g.name}</div>`).join('');

/* ---------- popup ---------- */
const pop=document.getElementById('pop');
function openPop(n){
  document.getElementById('popMeta').textContent = GROUPS[n.g].name;
  document.getElementById('popMeta').style.color = GROUPS[n.g].color;
  document.getElementById('popTitle').textContent = n.label;
  document.getElementById('popDesc').textContent = n.desc || '';
  const open = document.getElementById('popOpen'); open.setAttribute('href', n.url);
  open.textContent = (n.g==='section') ? 'Go to section →' : 'Open page →';
  pop.classList.add('show');
  pop.style.left = Math.min(window.innerWidth-330, window.innerWidth/2+40) + 'px';
  pop.style.top  = Math.max(80, window.innerHeight/2-90) + 'px';
}
function hidePop(){ pop.classList.remove('show'); }
document.getElementById('popX').onclick = hidePop;
document.addEventListener('keydown', e=>{ if(e.key==='Escape') hidePop(); });
</script>
<script src="drip-i18n.js"></script>
</body>
</html>
